<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Code 源码解析</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ===== CSS Variables ===== */
    :root {
      --bg-base:      #0d1117;
      --bg-sidebar:   #0a0e13;
      --bg-content:   #0d1117;
      --bg-card:      #161b22;
      --bg-hover:     #1c2230;
      --bg-active:    #1a2332;

      --border:       #21262d;
      --border-glow:  #388bfd33;

      --text-primary:   #e6edf3;
      --text-secondary: #8b949e;
      --text-muted:     #484f58;

      --accent-blue:    #58a6ff;
      --accent-green:   #3fb950;
      --accent-cyan:    #39d353;
      --accent-orange:  #f78166;
      --accent-purple:  #bc8cff;

      --sidebar-w: 300px;
      --header-h:  56px;
      --progress-h: 3px;
      --transition: 0.18s ease;
    }

    /* ===== Reset & Base ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ===== Reading Progress Bar ===== */
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: var(--progress-h);
      width: 0%;
      background: linear-gradient(90deg, #58a6ff, #3fb950, #58a6ff);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      z-index: 1000;
      transition: width 0.1s linear;
    }
    @keyframes shimmer {
      0%   { background-position: 200% center; }
      100% { background-position: -200% center; }
    }

    /* ===== Header ===== */
    #header {
      position: fixed;
      top: var(--progress-h);
      left: 0; right: 0;
      height: var(--header-h);
      background: rgba(10, 14, 19, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 0 0;
      z-index: 500;
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      width: var(--sidebar-w);
      border-right: 1px solid var(--border);
      height: 100%;
    }
    .brand-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #58a6ff 0%, #3fb950 100%);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .brand-text {
      display: flex; flex-direction: column;
    }
    .brand-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .brand-sub {
      font-size: 10px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .header-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-chapter {
      font-size: 13px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }
    .header-chapter span {
      color: var(--accent-blue);
    }
    #menu-toggle {
      display: none;
      background: none; border: none;
      color: var(--text-secondary);
      cursor: pointer; padding: 8px;
      font-size: 18px;
    }

    /* ===== Layout ===== */
    #layout {
      display: flex;
      padding-top: calc(var(--header-h) + var(--progress-h));
      min-height: 100vh;
    }

    /* ===== Sidebar ===== */
    #sidebar {
      position: fixed;
      top: calc(var(--header-h) + var(--progress-h));
      left: 0;
      width: var(--sidebar-w);
      height: calc(100vh - var(--header-h) - var(--progress-h));
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 300;
      transition: transform var(--transition);
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-track { background: transparent; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    #sidebar::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    .sidebar-header {
      padding: 16px 16px 8px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 4px;
    }
    .sidebar-progress-info {
      font-size: 12px;
      color: var(--text-secondary);
    }
    .sidebar-progress-bar {
      margin-top: 8px;
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }
    .sidebar-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
      border-radius: 1px;
      transition: width 0.4s ease;
    }

    .nav-list {
      flex: 1;
      padding: 8px 8px;
      list-style: none;
    }
    .nav-item {
      margin-bottom: 2px;
    }
    .nav-link {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
      transition: background var(--transition), border-color var(--transition);
      border: 1px solid transparent;
    }
    .nav-link:hover {
      background: var(--bg-hover);
      border-color: var(--border);
    }
    .nav-link.active {
      background: var(--bg-active);
      border-color: var(--border-glow);
    }
    .nav-link.active .nav-num {
      color: var(--accent-blue);
    }
    .nav-link.active .nav-title {
      color: var(--text-primary);
    }
    .nav-link.completed .nav-num::after {
      content: '✓';
      color: var(--accent-green);
      margin-left: 2px;
    }
    .nav-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      min-width: 24px;
      padding-top: 1px;
      line-height: 1.5;
    }
    .nav-title {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .nav-link.active .nav-title {
      color: var(--text-primary);
      font-weight: 600;
    }

    /* ===== Main Content ===== */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: calc(100vh - var(--header-h) - var(--progress-h));
      display: flex;
      flex-direction: column;
    }

    /* ===== Article ===== */
    #article {
      flex: 1;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 48px 40px 80px;
    }

    /* ===== Loading State ===== */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 400px;
      gap: 16px;
      color: var(--text-secondary);
    }
    .loading-spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Markdown Styles ===== */
    .md-content h1 {
      font-size: 2em;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.03em;
      line-height: 1.2;
      margin: 0 0 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, #e6edf3 0%, #8b949e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .md-content h2 {
      font-size: 1.4em;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin: 40px 0 16px;
      padding-top: 8px;
      position: relative;
    }
    .md-content h2::before {
      content: '';
      position: absolute;
      left: -20px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 60%;
      background: linear-gradient(180deg, var(--accent-blue), var(--accent-green));
      border-radius: 2px;
    }
    .md-content h3 {
      font-size: 1.15em;
      font-weight: 600;
      color: var(--accent-blue);
      margin: 28px 0 12px;
      letter-spacing: -0.01em;
    }
    .md-content h4 {
      font-size: 1em;
      font-weight: 600;
      color: var(--text-secondary);
      margin: 20px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
    }
    .md-content p {
      color: var(--text-secondary);
      margin: 0 0 16px;
      font-size: 0.95em;
    }
    .md-content a {
      color: var(--accent-blue);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color var(--transition);
    }
    .md-content a:hover { border-bottom-color: var(--accent-blue); }

    .md-content strong {
      color: var(--text-primary);
      font-weight: 600;
    }
    .md-content em { color: var(--accent-purple); }

    .md-content blockquote {
      margin: 20px 0;
      padding: 14px 18px;
      border-left: 3px solid var(--accent-blue);
      background: rgba(88, 166, 255, 0.05);
      border-radius: 0 6px 6px 0;
    }
    .md-content blockquote p {
      margin: 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    .md-content ul, .md-content ol {
      margin: 0 0 16px 20px;
    }
    .md-content li {
      color: var(--text-secondary);
      margin-bottom: 6px;
      font-size: 0.95em;
    }
    .md-content li > ul,
    .md-content li > ol {
      margin-top: 6px;
      margin-bottom: 0;
    }

    .md-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    /* Inline code */
    .md-content :not(pre) > code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85em;
      color: var(--accent-orange);
      background: rgba(247, 129, 102, 0.1);
      padding: 2px 6px;
      border-radius: 4px;
      border: 1px solid rgba(247, 129, 102, 0.2);
    }

    /* Code blocks */
    .md-content pre {
      margin: 20px 0;
      border-radius: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
      background: #0d1117;
    }
    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }
    .code-lang {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .code-copy {
      font-size: 11px;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      transition: color var(--transition), border-color var(--transition);
    }
    .code-copy:hover {
      color: var(--text-secondary);
      border-color: var(--text-muted);
    }
    .code-copy.copied {
      color: var(--accent-green);
      border-color: var(--accent-green);
    }
    .md-content pre code {
      display: block;
      padding: 16px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82em;
      line-height: 1.65;
      overflow-x: auto;
      background: transparent !important;
    }
    .md-content pre code::-webkit-scrollbar { height: 4px; }
    .md-content pre code::-webkit-scrollbar-track { background: transparent; }
    .md-content pre code::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Tables */
    .md-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 0.88em;
    }
    .md-content th {
      background: var(--bg-card);
      color: var(--text-primary);
      font-weight: 600;
      padding: 10px 14px;
      text-align: left;
      border: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9em;
      letter-spacing: 0.04em;
    }
    .md-content td {
      padding: 9px 14px;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .md-content tr:hover td { background: rgba(255,255,255,0.02); }

    /* ===== Article Navigation ===== */
    #article-nav {
      display: flex;
      gap: 16px;
      padding: 0 40px 40px;
      max-width: 820px;
      margin: 0 auto;
      width: 100%;
    }
    .nav-btn {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
    }
    .nav-btn:hover {
      background: var(--bg-hover);
      border-color: var(--accent-blue);
      transform: translateY(-1px);
    }
    .nav-btn.nav-prev { flex-direction: row; }
    .nav-btn.nav-next { flex-direction: row-reverse; }
    .nav-btn-arrow {
      font-size: 20px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .nav-btn-text {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .nav-btn-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .nav-btn-title {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .nav-btn:hover .nav-btn-title { color: var(--text-primary); }

    /* ===== Overlay ===== */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      backdrop-filter: blur(2px);
    }

    /* ===== Welcome Screen ===== */
    #welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      padding: 40px;
      text-align: center;
    }
    .welcome-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent-green);
      background: rgba(63, 185, 80, 0.1);
      border: 1px solid rgba(63, 185, 80, 0.3);
      padding: 4px 10px;
      border-radius: 100px;
      margin-bottom: 24px;
      letter-spacing: 0.06em;
    }
    .welcome-title {
      font-size: 2.8em;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #e6edf3 30%, #8b949e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .welcome-desc {
      font-size: 1em;
      color: var(--text-secondary);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    .welcome-stats {
      display: flex;
      gap: 24px;
      margin-bottom: 40px;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .stat-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.8em;
      font-weight: 600;
      color: var(--accent-blue);
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .welcome-start {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: var(--accent-blue);
      color: #0d1117;
      font-weight: 700;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      letter-spacing: -0.01em;
    }
    .welcome-start:hover {
      background: #79b8ff;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(88, 166, 255, 0.3);
    }

    /* ===== Responsive ===== */
    @media (max-width: 768px) {
      :root { --sidebar-w: 280px; }

      #sidebar {
        transform: translateX(-100%);
      }
      #sidebar.open {
        transform: translateX(0);
        box-shadow: 8px 0 32px rgba(0,0,0,0.5);
      }
      #overlay.show { display: block; }

      .header-brand { width: auto; border-right: none; }
      #menu-toggle { display: flex; }

      #main { margin-left: 0; }

      #article { padding: 28px 20px 60px; }
      #article-nav { padding: 0 20px 40px; }

      .md-content h1 { font-size: 1.5em; }
      .md-content h2 { font-size: 1.2em; }
      .md-content h2::before { display: none; }

      .welcome-title { font-size: 2em; }
    }
  </style>
</head>
<body>

  <!-- Reading Progress -->
  <div id="progress-bar"></div>

  <!-- Header -->
  <header id="header">
    <div class="header-brand">
      <div class="brand-icon">⬡</div>
      <div class="brand-text">
        <div class="brand-title">Claude Code</div>
        <div class="brand-sub">源码解析系列</div>
      </div>
    </div>
    <div class="header-meta">
      <div class="header-chapter" id="header-chapter"></div>
      <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
    </div>
  </header>

  <!-- Layout -->
  <div id="layout">

    <!-- Sidebar -->
    <nav id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-label">学习进度</div>
        <div class="sidebar-progress-info" id="progress-info">0 / 19 已读</div>
        <div class="sidebar-progress-bar">
          <div class="sidebar-progress-fill" id="sidebar-progress-fill" style="width:0%"></div>
        </div>
      </div>
      <ul class="nav-list" id="nav-list"></ul>
    </nav>

    <!-- Overlay for mobile -->
    <div id="overlay" onclick="toggleSidebar()"></div>

    <!-- Main -->
    <main id="main">
      <div id="article">
        <div id="welcome">
          <div class="welcome-badge">
            <span>●</span> 2026-03-31 泄露 · 51万行 TypeScript
          </div>
          <h1 class="welcome-title">Claude Code<br/>源码解析</h1>
          <p class="welcome-desc">
            基于 Anthropic Claude Code CLI 泄露源码的深度技术分析，
            从架构设计到工程实践，19 篇系统性解读。
          </p>
          <div class="welcome-stats">
            <div class="stat">
              <div class="stat-num">19</div>
              <div class="stat-label">篇文章</div>
            </div>
            <div class="stat">
              <div class="stat-num">51万</div>
              <div class="stat-label">行源码</div>
            </div>
            <div class="stat">
              <div class="stat-num">100%</div>
              <div class="stat-label">原创分析</div>
            </div>
          </div>
          <button class="welcome-start" onclick="loadChapter(0)">
            从第一篇开始 →
          </button>
        </div>
        <div id="loading" style="display:none">
          <div class="loading-spinner"></div>
          <div>加载中...</div>
        </div>
        <div id="md-content" class="md-content" style="display:none"></div>
      </div>
      <div id="article-nav" style="display:none"></div>
    </main>

  </div>

  <script src="content.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>

  <script>
    // ===== Chapter Data =====
    const CHAPTERS = [
      { file: '01-overview.md',             title: '总览与技术栈',              num: '01' },
      { file: '02-architecture.md',          title: '整体架构',                  num: '02' },
      { file: '03-query-engine.md',          title: 'QueryEngine 与 Query 管道', num: '03' },
      { file: '04-tool-system.md',           title: '工具系统深度解析',           num: '04' },
      { file: '05-permission-system.md',     title: '权限系统详解',               num: '05' },
      { file: '06-multi-agent.md',           title: '多智能体系统架构',           num: '06' },
      { file: '07-context-compaction.md',    title: '上下文压缩系统',             num: '07' },
      { file: '08-memory-system.md',         title: '记忆系统分析',               num: '08' },
      { file: '09-mcp-integration.md',       title: 'MCP 集成',                  num: '09' },
      { file: '10-bridge-system.md',         title: 'Bridge 系统详解',            num: '10' },
      { file: '11-plugins-skills.md',        title: '插件与技能系统',             num: '11' },
      { file: '12-authentication.md',        title: '认证系统分析',               num: '12' },
      { file: '13-tui-layer.md',             title: '终端 UI 层 React+Ink',       num: '13' },
      { file: '14-feature-flags.md',         title: 'Feature Flags 系统',        num: '14' },
      { file: '15-system-prompts.md',        title: '系统提示工程解析',           num: '15' },
      { file: '16-telemetry.md',             title: '遥测与分析系统',             num: '16' },
      { file: '17-startup-optimization.md',  title: '启动优化',                   num: '17' },
      { file: '18-design-patterns.md',       title: '设计模式与工程亮点',         num: '18' },
      { file: '19-summary.md',               title: '总结与启示',                 num: '19' },
    ];

    // ===== State =====
    let currentChapter = -1;
    let readChapters = new Set(JSON.parse(localStorage.getItem('readChapters') || '[]'));

    // ===== Init =====
    function init() {
      renderNavList();
      updateProgressUI();
      setupScrollListener();

      // Restore last position from URL hash
      const hash = location.hash.replace('#', '');
      const idx = CHAPTERS.findIndex(c => c.file === hash);
      if (idx >= 0) loadChapter(idx);
    }

    function renderNavList() {
      const list = document.getElementById('nav-list');
      list.innerHTML = CHAPTERS.map((ch, i) => `
        <li class="nav-item">
          <a class="nav-link ${readChapters.has(i) ? 'completed' : ''}" 
             id="nav-${i}" 
             onclick="loadChapter(${i})" 
             href="#${ch.file}">
            <span class="nav-num">${ch.num}</span>
            <span class="nav-title">${ch.title}</span>
          </a>
        </li>
      `).join('');
    }

    // ===== Load Chapter =====
    function loadChapter(idx) {
      if (idx < 0 || idx >= CHAPTERS.length) return;

      // Close mobile sidebar
      if (window.innerWidth <= 768) closeSidebar();

      const ch = CHAPTERS[idx];

      // Update URL
      history.pushState(null, '', '#' + ch.file);

      // Update active nav
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      const navEl = document.getElementById('nav-' + idx);
      if (navEl) {
        navEl.classList.add('active');
        navEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }

      // Show loading
      document.getElementById('welcome').style.display = 'none';
      document.getElementById('md-content').style.display = 'none';
      document.getElementById('loading').style.display = 'flex';
      document.getElementById('article-nav').style.display = 'none';

      // Fetch markdown
      try {
        const text = MARKDOWN_CONTENT[ch.file];
        if (!text) throw new Error('Content not found: ' + ch.file);

        // Parse markdown
        const html = marked.parse(text);

        const container = document.getElementById('md-content');
        container.innerHTML = html;

        // Wrap code blocks with header
        container.querySelectorAll('pre').forEach(pre => {
          const code = pre.querySelector('code');
          if (!code) return;
          const lang = (code.className.match(/language-(\w+)/) || [])[1] || 'code';
          const wrapper = document.createElement('div');
          wrapper.className = 'code-block-wrapper';
          pre.parentNode.insertBefore(wrapper, pre);
          wrapper.appendChild(pre);
          const header = document.createElement('div');
          header.className = 'code-header';
          header.innerHTML = `
            <span class="code-lang">${lang}</span>
            <button class="code-copy" onclick="copyCode(this)">复制</button>
          `;
          pre.insertAdjacentElement('beforebegin', header);
          // Move header inside wrapper
          wrapper.insertBefore(header, pre);
        });

        // Syntax highlighting
        container.querySelectorAll('pre code').forEach(block => {
          if (typeof hljs !== 'undefined') hljs.highlightElement(block);
        });

        document.getElementById('loading').style.display = 'none';
        container.style.display = 'block';

        // Scroll to top
        window.scrollTo({ top: 0, behavior: 'smooth' });

        currentChapter = idx;
        markRead(idx);
        updateHeaderChapter(idx);
        renderArticleNav(idx);
        resetProgressBar();

      } catch (e) {
        document.getElementById('loading').innerHTML = `
          <div style="color: var(--accent-orange)">内容加载失败: ${e.message}</div>
        `;
      }
    }

    // ===== Mark Read =====
    function markRead(idx) {
      readChapters.add(idx);
      localStorage.setItem('readChapters', JSON.stringify([...readChapters]));
      const navEl = document.getElementById('nav-' + idx);
      if (navEl) navEl.classList.add('completed');
      updateProgressUI();
    }

    function updateProgressUI() {
      const count = readChapters.size;
      document.getElementById('progress-info').textContent = `${count} / ${CHAPTERS.length} 已读`;
      document.getElementById('sidebar-progress-fill').style.width = `${(count / CHAPTERS.length) * 100}%`;
    }

    // ===== Article Nav =====
    function renderArticleNav(idx) {
      const nav = document.getElementById('article-nav');
      const prev = idx > 0 ? CHAPTERS[idx - 1] : null;
      const next = idx < CHAPTERS.length - 1 ? CHAPTERS[idx + 1] : null;

      nav.innerHTML = `
        ${prev ? `
          <a class="nav-btn nav-prev" onclick="loadChapter(${idx-1})" href="#${prev.file}">
            <span class="nav-btn-arrow">←</span>
            <div class="nav-btn-text">
              <span class="nav-btn-label">上一篇</span>
              <span class="nav-btn-title">${prev.num} · ${prev.title}</span>
            </div>
          </a>
        ` : '<div style="flex:1"></div>'}
        ${next ? `
          <a class="nav-btn nav-next" onclick="loadChapter(${idx+1})" href="#${next.file}">
            <span class="nav-btn-arrow">→</span>
            <div class="nav-btn-text">
              <span class="nav-btn-label">下一篇</span>
              <span class="nav-btn-title">${next.num} · ${next.title}</span>
            </div>
          </a>
        ` : '<div style="flex:1"></div>'}
      `;
      nav.style.display = 'flex';
    }

    // ===== Header Chapter =====
    function updateHeaderChapter(idx) {
      const ch = CHAPTERS[idx];
      document.getElementById('header-chapter').innerHTML =
        `<span>${ch.num}</span> / ${ch.title}`;
    }

    // ===== Reading Progress Bar =====
    function setupScrollListener() {
      window.addEventListener('scroll', () => {
        const scrollTop = window.scrollY;
        const docHeight = document.documentElement.scrollHeight - window.innerHeight;
        const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
        document.getElementById('progress-bar').style.width = pct + '%';

        // Auto-mark as read when 80% scrolled
        if (currentChapter >= 0 && pct > 80) {
          markRead(currentChapter);
        }
      });
    }

    function resetProgressBar() {
      document.getElementById('progress-bar').style.width = '0%';
    }

    // ===== Copy Code =====
    function copyCode(btn) {
      const pre = btn.closest('.code-block-wrapper').querySelector('pre code');
      navigator.clipboard.writeText(pre.innerText).then(() => {
        btn.textContent = '已复制!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '复制';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // ===== Mobile Sidebar =====
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('overlay');
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
    }
    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('overlay').classList.remove('show');
    }

    // ===== Handle browser back/forward =====
    window.addEventListener('popstate', () => {
      const hash = location.hash.replace('#', '');
      const idx = CHAPTERS.findIndex(c => c.file === hash);
      if (idx >= 0) loadChapter(idx);
      else {
        document.getElementById('welcome').style.display = 'flex';
        document.getElementById('md-content').style.display = 'none';
        document.getElementById('article-nav').style.display = 'none';
      }
    });

    // ===== Configure marked =====
    marked.setOptions({
      breaks: true,
      gfm: true,
    });

    // ===== Start =====
    init();
  </script>
</body>
</html>
